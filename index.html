<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Camper Gewicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f5f0e8; }
    body { font-family: 'DM Sans', sans-serif; color: #2c2416; overscroll-behavior: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; font-size: inherit; }
    input, select, textarea { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #b5a99066; border-radius: 4px; }
    #app { max-width: 680px; margin: 0 auto; min-height: 100vh; }
    .header { background: #2c3e2d; color: #f0ebe0; padding: 20px 20px 16px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    .sync-indicator { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .settings-btn { font-size: 22px; color: #f0ebe0; padding: 4px; }
    .weight-card { background: #fff; padding: 20px 20px 14px; border-bottom: 1px solid #e0d8cc; }
    .weight-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
    .weight-label { font-size: 11px; color: #8a7a6a; text-transform: uppercase; letter-spacing: 1px; }
    .weight-value { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 700; line-height: 1.1; }
    .weight-unit { font-size: 20px; font-weight: 400; }
    .remain-value { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; text-align: right; }
    .bar-track { height: 12px; background: #e8e0d4; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease, background 0.3s; }
    .bar-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .bar-label { font-size: 10px; color: #8a7a6a; }
    .nav { display: flex; background: #3d4e3e; padding: 6px 10px; gap: 4px; }
    .nav-btn { flex: 1; padding: 8px 2px; border-radius: 8px; color: #a0b5a0; font-size: 12px; font-weight: 500; transition: all 0.15s; }
    .nav-btn.active { background: #5a7c5a; color: #fff; }
    .content { padding: 16px 16px 80px; }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin-bottom: 12px; display: block; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; background: #e8e0d4; color: #5a4a3a; font-weight: 500; transition: all 0.15s; }
    .filter-chip.active { background: #5a7c5a; color: #fff; }
    .check-row { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #fff; border-radius: 12px; margin-bottom: 8px; border: 2px solid transparent; transition: all 0.15s; box-shadow: 0 1px 3px #00000010; text-align: left; }
    .check-row.checked { border-color: #5a7c5a; background: #f0f5f0; }
    .checkbox { width: 26px; height: 26px; border-radius: 8px; border: 2px solid #c0b8ac; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 14px; color: transparent; }
    .checkbox.checked { background: #5a7c5a; border-color: #5a7c5a; color: #fff; }
    .item-name { font-size: 15px; font-weight: 500; }
    .item-cat { font-size: 12px; color: #8a7a6a; margin-top: 2px; }
    .item-weight { font-size: 15px; font-weight: 600; flex-shrink: 0; }
    .add-box { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; background: #fff; padding: 12px; border-radius: 12px; flex-wrap: wrap; }
    .inp { padding: 10px 12px; border-radius: 8px; border: 1.5px solid #d8d0c4; font-size: 14px; background: #f8f4ee; outline: none; color: #2c2416; min-width: 0; width: 100%; }
    .inp:focus { border-color: #5a7c5a; }
    .add-btn { width: 42px; height: 42px; border-radius: 10px; background: #5a7c5a; color: #fff; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .item-row { display: flex; align-items: center; padding: 12px 14px; background: #fff; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 1px 3px #00000010; gap: 10px; }
    .item-row .detail { font-size: 12px; color: #8a7a6a; margin-top: 3px; }
    .selected-badge { font-size: 11px; background: #e8f0e8; color: #5a7c5a; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .btn-ghost { padding: 8px 14px; border-radius: 8px; border: 1.5px solid #c0b8ac; font-size: 13px; color: #5a4a3a; background: transparent; font-weight: 500; }
    .btn-accent { padding: 8px 14px; border-radius: 8px; background: #5a7c5a; color: #fff; font-size: 13px; font-weight: 600; }
    .btn-delete { width: 32px; height: 32px; border-radius: 8px; background: #f5ece8; color: #c0392b; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .set-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px #00000012; }
    .tag { padding: 3px 10px; border-radius: 20px; background: #e8e0d4; font-size: 11px; color: #5a4a3a; display: inline-block; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .save-set-box { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; background: #f0f5f0; padding: 12px; border-radius: 12px; border: 1.5px solid #5a7c5a; flex-wrap: wrap; }
    .history-card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 1px 3px #00000010; }
    .settings-card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 1px 4px #00000012; margin-bottom: 12px; }
    .settings-label { font-size: 14px; font-weight: 600; color: #3a3028; margin-bottom: 8px; display: block; }
    .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .inline-edit { cursor: text; border-bottom: 1px dashed #b0a898; outline: none; min-width: 40px; }
    .inline-edit-input { background: #f0ebe0; border: 1.5px solid #5a7c5a; border-radius: 6px; padding: 2px 6px; outline: none; color: #2c2416; font-family: inherit; }
    .basis-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f8f4ee; border-radius: 10px; margin-bottom: 6px; border: 1.5px solid #e0d8cc; }
    .basis-total { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #2c3e2d; color: #f0ebe0; border-radius: 10px; margin-top: 10px; font-weight: 600; font-size: 14px; }
    .danger-card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 1px 4px #00000012; border: 1.5px solid #f0d0cc; }
    .modal-overlay { position: fixed; inset: 0; background: #0006; display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 340px; width: 100%; box-shadow: 0 8px 32px #0003; }
    .modal h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #c0392b; }
    .modal p { font-size: 14px; color: #5a4a3a; line-height: 1.5; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .empty { color: #8a7a6a; font-size: 14px; padding: 24px 0; text-align: center; }
    .hint { color: #8a7a6a; font-size: 12px; margin-top: 8px; text-align: center; }
    .color-over { color: #c0392b; } .color-warn { color: #e67e22; } .color-ok { color: #5a7c5a; }
    .hidden { display: none; } .flex1 { flex: 1; }
    .mt4{margin-top:4px;} .mt8{margin-top:8px;} .mt10{margin-top:10px;} .mt12{margin-top:12px;}
    .fw700{font-weight:700;} .fs12{font-size:12px;}
    #loading { position: fixed; inset: 0; background: #f5f0e8; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 200; }
    #loading .logo { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 700; color: #2c3e2d; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid #e0d8cc; border-top-color: #5a7c5a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    #loading .load-status { font-size: 13px; color: #8a7a6a; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="logo">Camper Gewicht</div>
  <div class="spinner"></div>
  <div class="load-status" id="load-status">Verbinde mit Datenbank…</div>
</div>

<div id="app" class="hidden"></div>

<div id="confirm-modal" class="modal-overlay hidden">
  <div class="modal">
    <h3>Zurücksetzen?</h3>
    <p>Alle Positionen, Sets, Kategorien und Einstellungen werden auf die Standardwerte zurückgesetzt.</p>
    <div class="modal-btns">
      <button class="btn-ghost" id="confirm-cancel">Abbrechen</button>
      <button class="btn-accent" style="background:#c0392b" id="confirm-ok">Ja, zurücksetzen</button>
    </div>
  </div>
</div>

<script>
// ── Firebase config (wird dynamisch geladen) ──────────────────────────────────
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyDtCpaOGWBSejWQHri_m22qNgQydAF9MP4",
  authDomain: "stonescamperapp.firebaseapp.com",
  projectId: "stonescamperapp",
  storageBucket: "stonescamperapp.firebasestorage.app",
  messagingSenderId: "264977884187",
  appId: "1:264977884187:web:9d324815cf05acec8944be"
};
var db  = null;
var DOC = null;

const MAX_WEIGHT = 3500;

const DEFAULT_STATE = {
  appName: "Camper Gewicht",
  baseWeights: [
    { id: 1, name: "Leergewicht Fahrzeug", weight: 3120 },
    { id: 2, name: "Fahrer", weight: 80 },
  ],
  categories: ["Camping","Küche","Sport","Schlafen","Kleidung","Technik","Wasser","Sonstiges"],
  items: [
    {id:1,name:"Fahrräder (2x)",weight:28,category:"Sport",note:""},
    {id:2,name:"Campingstühle & Tisch",weight:12,category:"Camping",note:""},
    {id:3,name:"Schlafsäcke",weight:4,category:"Schlafen",note:""},
    {id:4,name:"Kühlbox",weight:15,category:"Küche",note:""},
    {id:5,name:"Werkzeugkasten",weight:8,category:"Technik",note:""},
    {id:6,name:"Gaskocher & Zubehör",weight:6,category:"Küche",note:""},
    {id:7,name:"Wassertank (voll)",weight:20,category:"Wasser",note:""},
    {id:8,name:"Kleidung (2 Personen)",weight:10,category:"Kleidung",note:""},
  ],
  sets: [
    {id:1,name:"Wochenendtrip",itemIds:[1,3,4,8],note:""},
    {id:2,name:"Sommerreise",itemIds:[1,2,3,4,6,8],note:""},
    {id:3,name:"Herbstreise",itemIds:[2,3,4,5,6,7,8],note:""},
  ],
  history: [],
};

let state = {
  appName:     DEFAULT_STATE.appName,
  baseWeights: JSON.parse(JSON.stringify(DEFAULT_STATE.baseWeights)),
  categories:  [...DEFAULT_STATE.categories],
  items:       JSON.parse(JSON.stringify(DEFAULT_STATE.items)),
  sets:        JSON.parse(JSON.stringify(DEFAULT_STATE.sets)),
  history:     [],
  selected:    new Set(),
  view:        "checklist",
  filterCat:   "Alle",
  syncStatus:  "Verbindet…",
};

let saveTimeout = null;
function saveAll() {
  clearTimeout(saveTimeout);
  state.syncStatus = "Speichert…";
  updateSyncIndicator();
  saveTimeout = setTimeout(() => {
    DOC.set({
      appName:     state.appName,
      baseWeights: state.baseWeights,
      categories:  state.categories,
      items:       state.items,
      sets:        state.sets,
      history:     state.history,
    }).then(() => {
      state.syncStatus = "✓ Gespeichert";
      updateSyncIndicator();
    }).catch(e => {
      state.syncStatus = "⚠ Fehler";
      updateSyncIndicator();
    });
  }, 600);
}

function updateSyncIndicator() {
  const el = document.querySelector(".sync-indicator");
  if (el) el.textContent = state.syncStatus;
}

// ── Computed ──────────────────────────────────────────────────────────────────
function baseWeight()     { return state.baseWeights.reduce((s,b) => s+b.weight, 0); }
function selectedWeight() { return state.items.filter(i => state.selected.has(i.id)).reduce((s,i) => s+i.weight, 0); }
function totalWeight()    { return baseWeight() + selectedWeight(); }
function remaining()      { return MAX_WEIGHT - totalWeight(); }

// ── DOM helpers ───────────────────────────────────────────────────────────────
function h(tag, attrs) {
  const el = document.createElement(tag);
  const children = Array.prototype.slice.call(arguments, 2).flat();
  if (attrs) {
    for (var k in attrs) {
      var v = attrs[k];
      if (k === "class") el.className = v;
      else if (k.indexOf("on") === 0) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
      else el.setAttribute(k, v);
    }
  }
  children.forEach(function(c) {
    if (c == null || c === false) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function inlineEdit(value, onSave, cls) {
  var span = h("span", {class: "inline-edit " + (cls||""), title: "Tippen zum Bearbeiten"}, value);
  span.addEventListener("click", function() {
    var inp = h("input", {class: "inline-edit-input", value: value});
    inp.style.fontSize = "inherit";
    inp.style.fontWeight = "inherit";
    inp.style.fontFamily = "inherit";
    inp.style.width = Math.max(value.length * 10, 80) + "px";
    function commit() {
      var v = inp.value.trim();
      if (v) onSave(v);
      inp.replaceWith(span);
      span.textContent = v || value;
    }
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); commit(); }
      if (e.key === "Escape") inp.replaceWith(span);
    });
    span.replaceWith(inp);
    inp.focus(); inp.select();
  });
  return span;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";

  var tw  = totalWeight();
  var bw  = baseWeight();
  var sw  = selectedWeight();
  var rem = remaining();
  var pct = Math.min((tw / MAX_WEIGHT) * 100, 100);
  var isOver = tw > MAX_WEIGHT;
  var isWarn = rem < 100 && !isOver;
  var barColor = isOver ? "#c0392b" : isWarn ? "#e67e22" : "#5a7c5a";
  var remColor = isOver ? "color-over" : isWarn ? "color-warn" : "color-ok";
  var twColor  = isOver ? "#c0392b"   : isWarn ? "#e67e22"    : "#2c3e2d";

  app.appendChild(h("div", {class:"header"},
    h("div", null,
      h("div", {class:"header-title"}, state.appName),
      h("div", {class:"header-sub"}, "Max. " + MAX_WEIGHT + " kg · Basis: " + bw + " kg"),
      h("div", {class:"sync-indicator"}, state.syncStatus)
    ),
    h("button", {class:"settings-btn", onClick: function(){ state.view="settings"; render(); }}, "⚙")
  ));

  app.appendChild(h("div", {class:"weight-card"},
    h("div", {class:"weight-row"},
      h("div", null,
        h("div", {class:"weight-label"}, "Gesamtgewicht"),
        h("div", {class:"weight-value", style:{color:twColor}}, tw.toFixed(1), h("span",{class:"weight-unit"}," kg"))
      ),
      h("div", null,
        h("div", {class:"weight-label"}, isOver ? "🚫 Überladen!" : isWarn ? "⚠ Fast voll" : "Noch frei"),
        h("div", {class:"remain-value " + remColor}, (isOver?"+":"") + Math.abs(rem).toFixed(1) + " kg")
      )
    ),
    h("div", {class:"bar-track"}, h("div", {class:"bar-fill", style:{width:pct+"%", background:barColor}})),
    h("div", {class:"bar-labels"},
      h("span",{class:"bar-label"},"Basis: " + bw + " kg"),
      h("span",{class:"bar-label"},"Zuladung: +" + sw + " kg · " + state.selected.size + " Pos."),
      h("span",{class:"bar-label"},"Max: " + MAX_WEIGHT + " kg")
    )
  ));

  var navItems = [["checklist","✓ Checkliste"],["items","📦 Positionen"],["sets","📂 Sets"],["history","📋 Verlauf"]];
  app.appendChild(h("div",{class:"nav"},
    ...navItems.map(function(x) {
      return h("button",{class:"nav-btn"+(state.view===x[0]?" active":""), onClick:(function(v){ return function(){ state.view=v; render(); }; })(x[0])}, x[1]);
    })
  ));

  var content = h("div", {class:"content"});
  app.appendChild(content);

  // ══ CHECKLIST ══
  if (state.view === "checklist") {
    var btnRow = h("div", {class:"btn-row"},
      h("button",{class:"btn-ghost",onClick:function(){state.selected=new Set();render();}},"Alle ab"),
      h("button",{class:"btn-ghost",onClick:function(){state.selected=new Set(state.items.map(function(i){return i.id;}));render();}},"Alle an")
    );
    if (state.selected.size > 0) {
      btnRow.appendChild(h("button",{class:"btn-accent",onClick:showSaveSet},"Als Set speichern"));
      btnRow.appendChild(h("button",{class:"btn-accent",onClick:saveToHistory,title:"Fahrt speichern"},"📋 Speichern"));
    }
    content.appendChild(h("div",{class:"section-row"},
      h("span",{class:"section-title",style:{marginBottom:"0"}},"Aktuelle Fahrt"), btnRow
    ));

    var saveSetBox = h("div",{class:"save-set-box hidden",id:"save-set-box"});
    var ssnInput = h("input",{class:"inp",placeholder:"Name des Sets…",style:{flex:"2 1 120px"}});
    var ssnNote  = h("input",{class:"inp",placeholder:"Notiz (optional)…",style:{flex:"3 1 140px"}});
    saveSetBox.appendChild(ssnInput);
    saveSetBox.appendChild(ssnNote);
    saveSetBox.appendChild(h("button",{class:"btn-accent",onClick:function(){
      var n=ssnInput.value.trim();
      if(!n||state.selected.size===0) return;
      state.sets.push({id:Date.now(),name:n,itemIds:[...state.selected],note:ssnNote.value.trim()});
      saveAll(); render();
    }},"Speichern"));
    saveSetBox.appendChild(h("button",{class:"btn-ghost",onClick:function(){saveSetBox.classList.add("hidden");}},"✕"));
    content.appendChild(saveSetBox);
    function showSaveSet() { saveSetBox.classList.remove("hidden"); ssnInput.focus(); }

    var usedCats = ["Alle"].concat(state.categories.filter(function(c){ return state.items.some(function(i){ return i.category===c; }); }));
    content.appendChild(h("div",{class:"filter-row"},
      ...usedCats.map(function(c){
        return h("button",{class:"filter-chip"+(state.filterCat===c?" active":""),
          onClick:(function(cat){ return function(){ state.filterCat=cat; render(); }; })(c)},c);
      })
    ));

    var filtered = state.filterCat==="Alle" ? state.items : state.items.filter(function(i){ return i.category===state.filterCat; });
    if (filtered.length===0) content.appendChild(h("div",{class:"empty"},"Keine Positionen in dieser Kategorie."));
    filtered.forEach(function(item) {
      var isChecked = state.selected.has(item.id);
      content.appendChild(h("button",{class:"check-row"+(isChecked?" checked":""),onClick:(function(it,chk){ return function(){
        chk ? state.selected.delete(it.id) : state.selected.add(it.id); render();
      }; })(item,isChecked)},
        h("div",{class:"checkbox"+(isChecked?" checked":"")}, isChecked?"✓":""),
        h("div",{class:"flex1"},
          h("div",{class:"item-name"},item.name),
          h("div",{class:"item-cat"},item.category+(item.note?" · "+item.note:""))
        ),
        h("div",{class:"item-weight",style:{color:isChecked?"#5a7c5a":"#8a7a6a"}},item.weight+" kg")
      ));
    });
  }

  // ══ ITEMS ══
  if (state.view === "items") {
    content.appendChild(h("span",{class:"section-title"},"Positionen verwalten"));
    var iName   = h("input",{class:"inp",placeholder:"Name…",style:{flex:"2 1 120px"}});
    var iWeight = h("input",{class:"inp",placeholder:"kg",type:"number",step:"0.1",style:{flex:"1 1 60px"}});
    var iCat    = h("select",{class:"inp",style:{flex:"1.5 1 90px"}});
    state.categories.forEach(function(c){ var o=document.createElement("option"); o.value=c; o.textContent=c; iCat.appendChild(o); });
    var iNote = h("input",{class:"inp",placeholder:"Notiz (opt.)…",style:{flex:"2 1 100px"}});
    var addBox = h("div",{class:"add-box"});
    addBox.appendChild(iName); addBox.appendChild(iWeight); addBox.appendChild(iCat); addBox.appendChild(iNote);
    addBox.appendChild(h("button",{class:"add-btn",onClick:function(){
      var n=iName.value.trim(), w=parseFloat(iWeight.value);
      if(!n||isNaN(w)) return;
      state.items.push({id:Date.now(),name:n,weight:w,category:iCat.value,note:iNote.value.trim()});
      saveAll(); render();
    }},"＋"));
    content.appendChild(addBox);

    state.items.forEach(function(item){
      var nameEl = inlineEdit(item.name, function(v){item.name=v;saveAll();});
      var wEl    = inlineEdit(String(item.weight), function(v){var n=parseFloat(v);if(!isNaN(n)){item.weight=n;saveAll();}});
      wEl.style.cssText="font-weight:600;font-size:12px;color:#5a4a3a;";
      var catSel = document.createElement("select");
      catSel.style.cssText="font-size:12px;background:none;border:none;color:#8a7a6a;padding:0;outline:none;font-family:inherit;";
      state.categories.forEach(function(c){ var o=document.createElement("option"); o.value=c; o.textContent=c; if(c===item.category)o.selected=true; catSel.appendChild(o); });
      catSel.addEventListener("change",function(){item.category=catSel.value;saveAll();});
      var detail = h("div",{class:"detail"});
      detail.appendChild(wEl); detail.appendChild(document.createTextNode(" kg · ")); detail.appendChild(catSel);
      if(item.note) detail.appendChild(h("span",null," · "+item.note));
      var isActive = state.selected.has(item.id);
      content.appendChild(h("div",{class:"item-row"},
        h("div",{class:"flex1"}, nameEl, detail),
        h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}},
          isActive ? h("span",{class:"selected-badge"},"✓ aktiv") : document.createTextNode(""),
          h("button",{class:"btn-delete",onClick:(function(it){ return function(){
            state.items=state.items.filter(function(i){return i.id!==it.id;});
            state.selected.delete(it.id);
            state.sets=state.sets.map(function(s){return Object.assign({},s,{itemIds:s.itemIds.filter(function(x){return x!==it.id;})});});
            saveAll(); render();
          }; })(item)},"✕")
        )
      ));
    });
    content.appendChild(h("div",{class:"hint"},"Namen und Gewichte direkt antippen zum Bearbeiten"));
  }

  // ══ SETS ══
  if (state.view === "sets") {
    content.appendChild(h("span",{class:"section-title"},"Gespeicherte Sets"));
    if (state.sets.length===0) content.appendChild(h("div",{class:"empty"},"Noch keine Sets gespeichert."));
    state.sets.forEach(function(set){
      var setItems = state.items.filter(function(i){ return set.itemIds.includes(i.id); });
      var setW = setItems.reduce(function(s,i){return s+i.weight;},0);
      var tot  = baseWeight() + setW;
      var ok   = tot <= MAX_WEIGHT;
      var nameEl = inlineEdit(set.name, function(v){set.name=v;saveAll();});
      nameEl.style.cssText="font-family:'Fraunces',serif;font-size:18px;font-weight:700;";
      var noteEl = set.note
        ? inlineEdit(set.note, function(v){set.note=v;saveAll();})
        : h("button",{class:"btn-ghost",style:{fontSize:"11px",padding:"3px 8px",marginTop:"4px"},
            onClick:(function(s){ return function(){s.note="Notiz…";saveAll();render();}; })(set)},"+Notiz");
      if (set.note) noteEl.style.cssText="font-size:12px;color:#8a7a6a;font-style:italic;";
      content.appendChild(h("div",{class:"set-card"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"}},
          h("div",{class:"flex1"}, nameEl,
            h("div",{class:"item-cat"},setItems.length+" Positionen · +"+setW+" kg Zuladung"),
            h("div",{class:"item-cat fw700",style:{color:ok?"#5a7c5a":"#c0392b"}},"Gesamt: "+tot.toFixed(1)+" kg "+(ok?"✓":"⚠ Überladen!")),
            noteEl
          ),
          h("div",{style:{display:"flex",flexDirection:"column",gap:"6px",flexShrink:"0"}},
            h("button",{class:"btn-accent",onClick:(function(s){ return function(){state.selected=new Set(s.itemIds);state.view="checklist";render();}; })(set)},"Laden"),
            h("button",{class:"btn-delete",onClick:(function(s){ return function(){state.sets=state.sets.filter(function(x){return x.id!==s.id;});saveAll();render();}; })(set)},"✕")
          )
        ),
        h("div",{class:"tags"}, ...setItems.map(function(i){return h("span",{class:"tag"},i.name);}))
      ));
    });
    content.appendChild(h("div",{class:"hint"},"Set-Namen direkt antippen zum Umbenennen"));
  }

  // ══ HISTORY ══
  if (state.view === "history") {
    content.appendChild(h("div",{class:"section-row"},
      h("span",{class:"section-title",style:{marginBottom:"0"}},"Fahrtenverlauf"),
      state.history.length>0 ? h("button",{class:"btn-ghost",onClick:function(){state.history=[];saveAll();render();}},"Alles löschen") : h("span",null,"")
    ));
    if (state.history.length===0) content.appendChild(h("div",{class:"empty"},"Noch keine Fahrten gespeichert."));
    state.history.forEach(function(e){
      var ok = e.totalWeight <= MAX_WEIGHT;
      content.appendChild(h("div",{class:"history-card"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",{style:{fontFamily:"'Fraunces',serif",fontSize:"17px",fontWeight:"700"}},e.date),
          h("div",{style:{fontSize:"14px",fontWeight:"700",color:ok?"#5a7c5a":"#c0392b"}},e.totalWeight.toFixed(1)+" kg")
        ),
        h("div",{class:"item-cat"},e.count+" Positionen · Zuladung: +"+e.selectedWeight+" kg"),
        h("div",{class:"tags"}, ...e.itemNames.map(function(n){return h("span",{class:"tag"},n);}))
      ));
    });
  }

  // ══ SETTINGS ══
  if (state.view === "settings") {
    content.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"18px"}},
      h("button",{class:"btn-ghost",onClick:function(){state.view="checklist";render();}},"← Zurück"),
      h("span",{class:"section-title",style:{marginBottom:"0"}},"Einstellungen")
    ));

    var nameInp = h("input",{class:"inp",placeholder:"App-Name…",value:state.appName,style:{flex:"1"}});
    nameInp.addEventListener("input",function(){state.appName=nameInp.value;saveAll();
      var t=document.querySelector(".header-title"); if(t) t.textContent=state.appName;});
    content.appendChild(h("div",{class:"settings-card"},
      h("span",{class:"settings-label"},"Name der App"),
      h("div",{style:{display:"flex",gap:"10px"}},nameInp),
      h("div",{class:"item-cat mt4"},"Wird im Header angezeigt")
    ));

    // Basisgewichte
    var basisCard = h("div",{class:"settings-card"});
    basisCard.appendChild(h("span",{class:"settings-label"},"Basisgewichte (immer geladen)"));
    basisCard.appendChild(h("div",{class:"item-cat",style:{marginBottom:"12px"}},"Leergewicht, Fahrer, Festeinbauten – alles was immer dabei ist."));
    var basisList = document.createElement("div");

    function renderBasisList() {
      basisList.innerHTML = "";
      state.baseWeights.forEach(function(bw) {
        var nameEl = inlineEdit(bw.name, function(v){ bw.name=v; saveAll(); updateBasisTotal(); });
        nameEl.style.cssText="flex:1;font-size:14px;color:#2c2416;";
        var wEl = inlineEdit(String(bw.weight), function(v){ var n=parseFloat(v); if(!isNaN(n)&&n>=0){bw.weight=n;saveAll();updateBasisTotal();} });
        wEl.style.cssText="font-weight:600;font-size:14px;color:#5a4a3a;white-space:nowrap;";
        basisList.appendChild(h("div",{class:"basis-item"}, nameEl,
          h("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}},
            wEl,
            h("span",{style:{fontSize:"13px",color:"#8a7a6a"}}," kg"),
            h("button",{class:"btn-delete",onClick:(function(b){ return function(){
              if(state.baseWeights.length<=1) return;
              state.baseWeights=state.baseWeights.filter(function(x){return x.id!==b.id;});
              saveAll(); renderBasisList(); updateBasisTotal();
            }; })(bw)},"✕")
          )
        ));
      });
    }

    var totalEl = h("div",{class:"basis-total"},
      h("span",null,"Startgewicht gesamt"),
      h("span",{id:"basis-total-val"}, baseWeight().toFixed(1)+" kg")
    );

    function updateBasisTotal() {
      var el=document.getElementById("basis-total-val");
      if(el) el.textContent=baseWeight().toFixed(1)+" kg";
      var sub=document.querySelector(".header-sub");
      if(sub) sub.textContent="Max. "+MAX_WEIGHT+" kg · Basis: "+baseWeight()+" kg";
    }

    renderBasisList();
    var bwName   = h("input",{class:"inp",placeholder:"Bezeichnung…",style:{flex:"2 1 120px"}});
    var bwWeight = h("input",{class:"inp",placeholder:"kg",type:"number",step:"0.1",style:{flex:"1 1 70px"}});
    function addBasis() {
      var n=bwName.value.trim(), w=parseFloat(bwWeight.value);
      if(!n||isNaN(w)||w<0) return;
      state.baseWeights.push({id:Date.now(),name:n,weight:w});
      bwName.value=""; bwWeight.value="";
      saveAll(); renderBasisList(); updateBasisTotal();
    }
    bwName.addEventListener("keydown",function(e){ if(e.key==="Enter") addBasis(); });
    bwWeight.addEventListener("keydown",function(e){ if(e.key==="Enter") addBasis(); });
    basisCard.appendChild(basisList);
    basisCard.appendChild(totalEl);
    var addBasisBox = h("div",{class:"add-box",style:{marginTop:"12px",marginBottom:"0"}});
    addBasisBox.appendChild(bwName); addBasisBox.appendChild(bwWeight);
    addBasisBox.appendChild(h("button",{class:"add-btn",onClick:addBasis},"＋"));
    basisCard.appendChild(addBasisBox);
    basisCard.appendChild(h("div",{class:"hint"},"Namen und Gewichte direkt antippen zum Bearbeiten"));
    content.appendChild(basisCard);

    // Kategorien
    var catList = document.createElement("div");
    catList.style.marginTop="10px";
    function renderCatList() {
      catList.innerHTML="";
      state.categories.forEach(function(cat){
        var count=state.items.filter(function(i){return i.category===cat;}).length;
        var nameEl=inlineEdit(cat, function(newName){
          var n=newName.trim();
          if(!n||n===cat||state.categories.includes(n)) return;
          state.categories=state.categories.map(function(c){return c===cat?n:c;});
          state.items=state.items.map(function(i){return i.category===cat?Object.assign({},i,{category:n}):i;});
          saveAll(); renderCatList();
        });
        nameEl.style.cssText="flex:1;font-size:14px;color:#2c2416;";
        catList.appendChild(h("div",{class:"cat-row"}, nameEl,
          h("span",{class:"item-cat"},"("+count+")"),
          h("button",{class:"btn-delete",onClick:(function(c){ return function(){
            state.categories=state.categories.filter(function(x){return x!==c;});
            state.items=state.items.map(function(i){return i.category===c?Object.assign({},i,{category:"Sonstiges"}):i;});
            saveAll(); renderCatList();
          }; })(cat)},"✕")
        ));
      });
    }
    renderCatList();
    var ncInp=h("input",{class:"inp",placeholder:"Neue Kategorie…",style:{flex:"1"}});
    function addCat(){
      var n=ncInp.value.trim();
      if(!n||state.categories.includes(n)) return;
      state.categories.push(n); ncInp.value=""; saveAll(); renderCatList();
    }
    ncInp.addEventListener("keydown",function(e){ if(e.key==="Enter") addCat(); });
    var catAddBox = h("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}});
    catAddBox.appendChild(ncInp); catAddBox.appendChild(h("button",{class:"add-btn",onClick:addCat},"＋"));
    content.appendChild(h("div",{class:"settings-card"},
      h("span",{class:"settings-label"},"Kategorien"), catList, catAddBox,
      h("div",{class:"hint"},"Kategorienamen direkt antippen zum Umbenennen")
    ));

    content.appendChild(h("div",{class:"danger-card"},
      h("span",{class:"settings-label",style:{color:"#c0392b"}},"Daten zurücksetzen"),
      h("div",{class:"item-cat"},"Alle Positionen, Sets und Einstellungen auf Standard zurücksetzen."),
      h("button",{class:"btn-ghost mt10",style:{color:"#c0392b",borderColor:"#e0a0a0"},
        onClick:function(){document.getElementById("confirm-modal").classList.remove("hidden");}},"Zurücksetzen")
    ));
  }
}

// ── Save to history ───────────────────────────────────────────────────────────
function saveToHistory() {
  if (state.selected.size===0) return;
  var sw=selectedWeight();
  state.history.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString("de-DE"),
    totalWeight: totalWeight(),
    selectedWeight: sw,
    count: state.selected.size,
    itemNames: state.items.filter(function(i){return state.selected.has(i.id);}).map(function(i){return i.name;}),
  });
  state.history=state.history.slice(0,20);
  saveAll();
  var btn=document.querySelector(".btn-accent[title='Fahrt speichern']");
  if(btn){btn.textContent="✓ Gespeichert";btn.disabled=true;setTimeout(function(){render();},1200);}
}

// ── Confirm modal ─────────────────────────────────────────────────────────────
document.getElementById("confirm-cancel").addEventListener("click",function(){
  document.getElementById("confirm-modal").classList.add("hidden");
});
document.getElementById("confirm-ok").addEventListener("click",function(){
  document.getElementById("confirm-modal").classList.add("hidden");
  state.appName     = DEFAULT_STATE.appName;
  state.baseWeights = JSON.parse(JSON.stringify(DEFAULT_STATE.baseWeights));
  state.categories  = [...DEFAULT_STATE.categories];
  state.items       = JSON.parse(JSON.stringify(DEFAULT_STATE.items));
  state.sets        = JSON.parse(JSON.stringify(DEFAULT_STATE.sets));
  state.history     = [];
  state.selected    = new Set();
  state.view        = "checklist";
  saveAll(); render();
});
document.getElementById("confirm-modal").addEventListener("click",function(e){
  if(e.target.id==="confirm-modal") document.getElementById("confirm-modal").classList.add("hidden");
});

// ── Init ──────────────────────────────────────────────────────────────────────
// App sofort anzeigen mit localStorage als Fallback
function loadFromLocalStorage() {
  try {
    var s = localStorage.getItem("camper_state");
    if (s) {
      var d = JSON.parse(s);
      state.appName     = d.appName     || DEFAULT_STATE.appName;
      state.baseWeights = d.baseWeights || JSON.parse(JSON.stringify(DEFAULT_STATE.baseWeights));
      state.categories  = d.categories  || [...DEFAULT_STATE.categories];
      state.items       = d.items       || JSON.parse(JSON.stringify(DEFAULT_STATE.items));
      state.sets        = d.sets        || JSON.parse(JSON.stringify(DEFAULT_STATE.sets));
      state.history     = d.history     || [];
    }
  } catch(e) {}
}

function saveToLocalStorage() {
  try {
    localStorage.setItem("camper_state", JSON.stringify({
      appName: state.appName, baseWeights: state.baseWeights,
      categories: state.categories, items: state.items,
      sets: state.sets, history: state.history
    }));
  } catch(e) {}
}

function showApp() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}

function syncFromFirebase() {
  if (!DOC) return;
  DOC.get().then(function(snap) {
    if (snap.exists) {
      var d = snap.data();
      state.appName     = d.appName     || DEFAULT_STATE.appName;
      state.baseWeights = d.baseWeights || JSON.parse(JSON.stringify(DEFAULT_STATE.baseWeights));
      state.categories  = d.categories  || [...DEFAULT_STATE.categories];
      state.items       = d.items       || JSON.parse(JSON.stringify(DEFAULT_STATE.items));
      state.sets        = d.sets        || JSON.parse(JSON.stringify(DEFAULT_STATE.sets));
      state.history     = d.history     || [];
      state.syncStatus  = "✓ Verbunden";
    } else {
      state.syncStatus = "✓ Bereit";
      DOC.set({
        appName: state.appName, baseWeights: state.baseWeights,
        categories: state.categories, items: state.items,
        sets: state.sets, history: state.history
      });
    }
    saveToLocalStorage();
    render();
  }).catch(function(e) {
    state.syncStatus = "⚠ Offline";
    render();
  });
}

function loadFirebase() {
  var s1 = document.createElement("script");
  s1.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
  s1.onload = function() {
    var s2 = document.createElement("script");
    s2.src = "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js";
    s2.onload = function() {
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        db  = firebase.firestore();
        DOC = db.collection("camper").doc("gewicht");
        state.syncStatus = "Synchronisiert…";
        updateSyncIndicator();
        syncFromFirebase();
      } catch(e) {
        state.syncStatus = "⚠ Firebase Fehler";
        updateSyncIndicator();
      }
    };
    s2.onerror = function() { state.syncStatus = "⚠ Offline"; updateSyncIndicator(); };
    document.head.appendChild(s2);
  };
  s1.onerror = function() { state.syncStatus = "⚠ Offline"; updateSyncIndicator(); };
  document.head.appendChild(s1);
}

// App sofort starten
loadFromLocalStorage();
state.syncStatus = "Verbindet…";
showApp();

// Firebase im Hintergrund laden
setTimeout(loadFirebase, 100);
</script>
